version: '3.8'

services:
  moltendocs:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    working_dir: /app
    command: npm run dev
    restart: unless-stopped
